<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="CSS/form.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&display=swap"
        rel="stylesheet">
    <link rel="shortcut icon" href="" type="image/x-icon">
    <script src="https://kit.fontawesome.com/d1e95bc287.js" crossorigin="anonymous"></script>
    <script src="JS/script.js"></script>
    <title>Formulário</title>
</head>

<body class="container">
    <div class="container-row">
        <img src="" alt="">
    </div>
    <div class="container-row">
        <div class="form">
            <form action="https://sheetdb.io/api/v1/wfxuy0l16ulox" method="post">
                <h2 class="title">Cadastrar</h2>

                <label for="username">Nome</label>
                <div class="input">
                    <i class="fa fa-user" aria-hidden="true"></i>
                    <input id="username" name="data[nome]" placeholder="Nome" type="text">
                </div>

                <label for="email">Email</label>
                <div class="input">
                    <i class="fa fa-envelope" aria-hidden="true"></i>
                    <input id="email" name="data[email]" placeholder="Email" type="text">
                </div>

                <label for="password">Senha</label>
                <div class="input">
                    <i class="fa fa-lock" aria-hidden="true"></i>
                    <input id="password" name="data[senha]" placeholder="Senha" type="password">
                </div>

                <div id="btn">
                    <button type="submit">Cadastrar</button>
                </div>
            </form>
        </div>
    </div>
</body>


</html>
